name: DevSecOps CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:

  build:
    name: "Checkout + Build"
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:

      - name: "1 — Checkout code"
        uses: actions/checkout@v4

      - name: "2 — Setup Node.js"
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: "3 — Check structure"
        run: |
          echo "=== Repo root ==="
          ls -la
          echo "=== juice-shop/ ==="
          ls juice-shop/
          echo "=== package-lock.json ? ==="
          ls juice-shop/package-lock.json && echo "✅ Trouvé" || echo "❌ Manquant"

      - name: "4 — Build Docker image"
        run: |
          echo "Build Docker en cours (10-15 min)..."
          docker build \
            -t juice-shop:${{ github.sha }} \
            -f juice-shop/Dockerfile \
            juice-shop/
          echo "✅ Image construite !"

      - name: "5 — Smoke test"
        run: |
          docker run -d -p 3000:3000 --name juice-test juice-shop:${{ github.sha }}
          sleep 30
          HTTP=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:3000 || echo "000")
          echo "HTTP code: $HTTP"
          docker stop juice-test && docker rm juice-test
          [ "$HTTP" = "200" ] || [ "$HTTP" = "302" ] && echo "✅ OK" || echo "⚠️ Code: $HTTP"

      - name: "6 — Summary"
        run: |
          echo "✅ BUILD RÉUSSI — Branch: ${{ github.ref_name }} — Commit: ${{ github.sha }}"
