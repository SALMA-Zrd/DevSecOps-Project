name: DevSecOps CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:

  # ─────────────────────────────────────────
  # JOB 1 : Checkout + Build de base
  # Objectif : vérifier que le code se build
  # ─────────────────────────────────────────
  build:
    name: "Checkout + Build"
    runs-on: ubuntu-latest

    steps:

      # ÉTAPE 1 — Récupérer le code
      - name: "1 — Checkout code"
        uses: actions/checkout@v4

      # ÉTAPE 2 — Installer Node.js
      - name: "2 — Setup Node.js"
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: juice-shop/package-lock.json

      # ÉTAPE 3 — Installer les dépendances
      - name: "3 — Install dependencies"
        working-directory: juice-shop
        run: npm install --omit=dev

      # ÉTAPE 4 — Vérifier que l'app démarre
      - name: "4 — Build check"
        working-directory: juice-shop
        run: |
          echo "Build réussi — application prête"
          node -e "console.log('Node.js OK:', process.version)"

      # ÉTAPE 5 — Build image Docker
      - name: "5 — Build Docker image"
        run: |
          docker build \
            -t juice-shop:${{ github.sha }} \
            -f juice-shop/Dockerfile \
            juice-shop/
          echo "Image Docker construite avec succès"
          docker images juice-shop:${{ github.sha }}

      # ÉTAPE 6 — Résumé du build
      - name: "6 — Build Summary"
        run: |
          echo "================================"
          echo "✅ BUILD RÉUSSI"
          echo "Branch  : ${{ github.ref_name }}"
          echo "Commit  : ${{ github.sha }}"
          echo "Author  : ${{ github.actor }}"
          echo "================================"
